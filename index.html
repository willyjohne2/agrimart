<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agri-Mart | Professional Agricultural Machinery</title>
    <link rel="stylesheet" href="/assets/css/index.css">
    <link rel="stylesheet" href="/assets/css/header.css">
    <link rel="stylesheet" href="/assets/css/footer.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>


   <header></header>


    <section id="home" class="hero">
        <div class="hero-overlay"></div>
        <div class="container hero-content">
            <h1>Industrial Grade Agricultural Machinery</h1>
            <p>Providing the backbone for modern farming with state-of-the-art equipment.</p>
            <a href="#products" class="btn btn-accent">View Our Equipment</a>
        </div>
    </section>


    <section id="products" class="products">
        <div class="container">
            <h2>Featured Products</h2>
            <div id="product-grid" class="product-grid">

            </div>
        </div>
    </section>


    <section class="testimonials">
        <div class="container">
            <h2>What Farmers Say</h2>
            <div class="testimonial-slider">
                <div id="testimonial-content" class="testimonial-content">

                </div>
                <div class="slider-controls">
                    <button id="prev-btn" class="slider-btn"><i class="fas fa-chevron-left"></i></button>
                    <button id="next-btn" class="slider-btn"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        </div>
    </section>


    <section class="purchase-cta">
        <div class="container">
            <div class="cta-box">
                <h3>Ready to upgrade your farm equipment?</h3>
                <button class="btn btn-accent"
                    onclick="document.getElementById('products').scrollIntoView({behavior: 'smooth'})">Purchase With
                    Us</button>
            </div>
        </div>
    </section>

   

    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="modal-body" id="modal-body">

            </div>
        </div>
    </div>
    <footer></footer>
    <script src="/assets/js/include-header-footer.js"></script>
    <script src="/assets/js/script.js"></script>
</body>

</html>
